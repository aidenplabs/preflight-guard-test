name: preflight-guard-test

on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out target repo
        uses: actions/checkout@v4

      - name: Run preflight guard
        uses: aidenplabs/preflight-guard-action@main
        with:
          path: .
          output-dir: .preflight-guard
          fail-on: no

      - name: Show generated files
        if: always()
        run: |
          echo "workspace: $GITHUB_WORKSPACE"
          ls -la
          ls -la .preflight-guard || true
          find .preflight-guard -maxdepth 2 -type f || true

      - name: Append full Markdown report to job summary
        if: always()
        run: |
          if [ -f .preflight-guard/preflight-report.md ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "## Full Markdown Report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat .preflight-guard/preflight-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "## Full Markdown Report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Report file not found: .preflight-guard/preflight-report.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Print JSON report
        if: always()
        run: |
          echo "=== JSON report ==="
          cat .preflight-guard/preflight-report.json || true
